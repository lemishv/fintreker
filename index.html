function renderTxDetail() {
  const t = state.modalCtx;
  if (!t) return '';

  // Transfer has different layout
  if (t.type === 'Transfer') {
    const fromAcc = findAccount(t.accountId);
    const toAcc = findAccount(t.toAccountId);
    const fromCur = t.currency || (fromAcc ? fromAcc.currency : 'EUR');
    const toCur = t.toCurrency || (toAcc ? toAcc.currency : fromCur);
    const sameCur = fromCur === toCur;

    return `
      <div class="scrim">
        <div class="sheet">
          <div class="sheet-head">
            <span class="title">Переказ</span>
            <button class="close" data-action="close-modal">${ICONS.close}</button>
          </div>
          <div class="sheet-body">
            <div class="tx-preview">
              <div class="tx-preview-amount num" style="color: var(--transfer)">
                ${fmtMoney(t.amount, false, fromCur)}${sameCur ? '' : ` → ${fmtMoney(t.toAmount, false, toCur)}`}
              </div>
              <div class="tx-preview-row">
                <span class="lbl">З рахунку</span>
                <span class="val">${fromAcc ? `<span class="swatch" style="display:inline-block;width:10px;height:10px;border-radius:3px;background:${fromAcc.color};margin-right:6px;vertical-align:middle"></span>${escapeHtml(fromAcc.name)}` : '—'}</span>
              </div>
              <div class="tx-preview-row">
                <span class="lbl">На рахунок</span>
                <span class="val">${toAcc ? `<span class="swatch" style="display:inline-block;width:10px;height:10px;border-radius:3px;background:${toAcc.color};margin-right:6px;vertical-align:middle"></span>${escapeHtml(toAcc.name)}` : '—'}</span>
              </div>
              <div class="tx-preview-row">
                <span class="lbl">Дата</span>
                <span class="val">${fmtDateLabel(t.date)}</span>
              </div>
              ${t.note ? `
                <div class="tx-preview-row">
                  <span class="lbl">Примітка</span>
                  <span class="val">${escapeHtml(t.note)}</span>
                </div>
              ` : ''}
            </div>
          </div>
          <div class="sheet-foot foot-3">
            <button class="btn secondary" data-action="close-modal">Закрити</button>
            <button class="btn accent" data-action="edit-tx" data-id="${t.id}">Редагувати</button>
            <button class="btn danger" data-action="del-tx-from-detail" data-id="${t.id}">Видалити</button>
          </div>
        </div>
      </div>
    `;
  }

  // Regular Income/Expense/Opening
  const acc = findAccount(t.accountId);
  const cat = findCategory(t.categoryId);
  const isInc = t.type === 'Income';
  const isOpen = t.type === 'Opening';
  const label = isOpen ? 'Початковий залишок' : (cat ? cat.name : '—');
  const amountColor = (isInc || isOpen) ? 'var(--income)' : 'var(--expense)';
  const sign = (isInc || isOpen) ? '+' : '−';

  return `
    <div class="scrim">
      <div class="sheet">
        <div class="sheet-head">
          <span class="title">Транзакція</span>
          <button class="close" data-action="close-modal">${ICONS.close}</button>
        </div>
        <div class="sheet-body">
          <div class="tx-preview">
            <div class="tx-preview-amount num" style="color:${amountColor}">${sign}${fmtMoney(Math.abs(t.amount), false, t.currency).replace('−','').replace('+','')}</div>
            <div class="tx-preview-row">
              <span class="lbl">Категорія</span>
              <span class="val">${cat ? `<span class="swatch" style="display:inline-block;width:10px;height:10px;border-radius:3px;background:${cat.color};margin-right:6px;vertical-align:middle"></span>${escapeHtml(label)}` : escapeHtml(label)}</span>
            </div>
            <div class="tx-preview-row">
              <span class="lbl">Рахунок</span>
              <span class="val">${acc ? `<span class="swatch" style="display:inline-block;width:10px;height:10px;border-radius:3px;background:${acc.color};margin-right:6px;vertical-align:middle"></span>${escapeHtml(acc.name)}` : '—'}</span>
            </div>
            <div class="tx-preview-row">
              <span class="lbl">Дата</span>
              <span class="val">${fmtDateLabel(t.date)}</span>
            </div>
            ${t.note ? `
              <div class="tx-preview-row">
                <span class="lbl">Примітка</span>
                <span class="val">${escapeHtml(t.note)}</span>
              </div>
            ` : ''}
          </div>
        </div>
        <div class="sheet-foot foot-3">
          <button class="btn secondary" data-action="close-modal">Закрити</button>
          ${t.type !== 'Opening' ? `<button class="btn accent" data-action="edit-tx" data-id="${t.id}">Редагувати</button>` : '<span></span>'}
          <button class="btn danger" data-action="del-tx-from-detail" data-id="${t.id}">Видалити</button>
        </div>
      </div>
    </div>
  `;
}

function renderNewTxModal() {
  const f = state.modalForm;
  const accs = state.data.accounts.filter(a => !a.archived);
  const isEdit = !!f.editingId;
  const isTransfer = f.type === 'Transfer';

  // Validity differs by type
  let valid = false;
  if (isTransfer) {
    const fromAcc = accs.find(a => a.id === f.accountId);
    const toAcc = accs.find(a => a.id === f.toAccountId);
    const amtOk = f.amount && parseFloat(f.amount) > 0;
    const diffAccs = f.accountId && f.toAccountId && f.accountId !== f.toAccountId;
    const toAmtOk = (fromAcc && toAcc && fromAcc.currency === toAcc.currency)
                    || (f.toAmount && parseFloat(f.toAmount) > 0);
    valid = fromAcc && toAcc && diffAccs && amtOk && toAmtOk;
  } else {
    const availableCats = state.data.categories.filter(c => c.type === f.type && !c.archived);
    const validAcc = f.accountId && accs.some(a => a.id === f.accountId);
    const validCat = f.categoryId && availableCats.some(c => c.id === f.categoryId);
    const validAmt = f.amount && parseFloat(f.amount) > 0;
    valid = validAcc && validCat && validAmt;
  }

  const title = isEdit
    ? (isTransfer ? 'Редагувати переказ' : 'Редагувати транзакцію')
    : (isTransfer ? 'Новий переказ' : 'Нова транзакція');

  return `
    <div class="scrim">
      <div class="sheet">
        <div class="sheet-head">
          <span class="title">${title}</span>
          <button class="close" data-action="close-modal">${ICONS.close}</button>
        </div>
        <div class="sheet-body">

          <div class="field">
            <div class="toggle toggle-3">
              <button class="${f.type === 'Income' ? 'active income' : ''}" data-action="tx-type" data-key="Income">
                <span class="ico">${ICONS.down}</span>
                <span>Дохід</span>
              </button>
              <button class="${f.type === 'Expense' ? 'active expense' : ''}" data-action="tx-type" data-key="Expense">
                <span class="ico">${ICONS.up}</span>
                <span>Витрата</span>
              </button>
              <button class="${f.type === 'Transfer' ? 'active transfer' : ''}" data-action="tx-type" data-key="Transfer">
                <span class="ico">${ICONS.swap}</span>
                <span>Переказ</span>
              </button>
            </div>
          </div>

          ${isTransfer
            ? renderTxFormTransfer(f, accs)
            : renderTxFormRegular(f, accs)}

          <div class="field">
            <div class="field-label"><span class="lbl">Дата</span></div>
            <input class="input" type="date" value="${escapeAttr(f.date || todayISO())}" data-form="date">
          </div>

          <div class="field">
            <div class="field-label"><span class="lbl">Примітка</span><span class="opt">опційно</span></div>
            <input class="input" type="text" placeholder="" value="${escapeAttr(f.note || '')}" data-form="note">
          </div>

        </div>
        <div class="sheet-foot">
          <button class="btn secondary" data-action="close-modal">Скасувати</button>
          <button class="btn primary" data-action="save-tx" ${valid ? '' : 'disabled'}>${isEdit ? 'Оновити' : 'Зберегти'}</button>
        </div>
      </div>
    </div>
  `;
}

function renderTxFormRegular(f, accs) {
  const availableCats = state.data.categories.filter(c => c.type === f.type && !c.archived);
  const acc = accs.find(a => a.id === f.accountId);
  const cur = acc ? acc.currency : 'EUR';

  return `
    <div class="field">
      <div class="field-label"><span class="lbl">Сума</span>${acc ? `<span class="opt">${cur}</span>` : ''}</div>
      <input class="input amount num" type="number" inputmode="decimal" step="0.01"
        placeholder="0.00" value="${escapeAttr(f.amount || '')}"
        data-form="amount">
    </div>

    <div class="field">
      <div class="field-label"><span class="lbl">Рахунок</span></div>
      <select class="select" data-form="accountId">
        <option value="">— оберіть —</option>
        ${accs.map(a => `<option value="${a.id}" ${f.accountId === a.id ? 'selected' : ''}>${escapeHtml(a.name)} · ${a.currency}</option>`).join('')}
      </select>
    </div>

    <div class="field">
      <div class="field-label"><span class="lbl">Категорія</span></div>
      <select class="select" data-form="categoryId">
        <option value="">— оберіть —</option>
        ${availableCats.map(c => `<option value="${c.id}" ${f.categoryId === c.id ? 'selected' : ''}>${escapeHtml(c.name)}</option>`).join('')}
        <option value="__new__">+ Нова категорія…</option>
      </select>
    </div>
  `;
}

function renderTxFormTransfer(f, accs) {
  const fromAcc = accs.find(a => a.id === f.accountId);
  const toAcc = accs.find(a => a.id === f.toAccountId);
  const sameCur = fromAcc && toAcc && fromAcc.currency === toAcc.currency;
  const crossCur = fromAcc && toAcc && !sameCur;
  const fromCur = fromAcc ? fromAcc.currency : '';
  const toCur = toAcc ? toAcc.currency : '';

  // Available "to" accounts: all except the chosen "from"
  const toAccs = accs.filter(a => a.id !== f.accountId);

  return `
    <div class="field">
      <div class="field-label"><span class="lbl">З рахунку</span></div>
      <select class="select" data-form="accountId">
        <option value="">— оберіть —</option>
        ${accs.map(a => `<option value="${a.id}" ${f.accountId === a.id ? 'selected' : ''}>${escapeHtml(a.name)} · ${a.currency}</option>`).join('')}
      </select>
    </div>

    <div class="field">
      <div class="field-label"><span class="lbl">На рахунок</span></div>
      <select class="select" data-form="toAccountId">
        <option value="">— оберіть —</option>
        ${toAccs.map(a => `<option value="${a.id}" ${f.toAccountId === a.id ? 'selected' : ''}>${escapeHtml(a.name)} · ${a.currency}</option>`).join('')}
      </select>
    </div>

    <div class="field">
      <div class="field-label"><span class="lbl">Сума списання</span>${fromCur ? `<span class="opt">${fromCur}</span>` : ''}</div>
      <input class="input amount num" type="number" inputmode="decimal" step="0.01"
        placeholder="0.00" value="${escapeAttr(f.amount || '')}"
        data-form="amount" id="tx-from-amount">
    </div>

    ${crossCur ? `
      <div class="field">
        <div class="field-label">
          <span class="lbl">Сума зарахування</span>
          <span class="opt">${toCur}</span>
        </div>
        <input class="input amount num" type="number" inputmode="decimal" step="0.01"
          placeholder="0.00" value="${escapeAttr(f.toAmount || '')}"
          data-form="toAmount" id="tx-to-amount">
        <div class="cross-cur-hint">
          ${f.amount && parseFloat(f.amount) > 0
            ? `За курсом ≈ ${fmtMoney(convertCurrency(parseFloat(f.amount), fromCur, toCur), false, toCur)}. Скорегуй якщо банк дав інше.`
            : 'Розрахується автоматично за курсом, можеш скорегувати.'}
        </div>
      </div>
    ` : ''}
  `;
}

function renderNewAccModal() {
  const f = state.modalForm;
  const isEdit = !!f.editingId;
  const valid = f.name && f.name.trim().length > 0 && f.currency && !state.data.accounts.some(a => a.name === f.name.trim() && a.id !== f.editingId);

  return `
    <div class="scrim">
      <div class="sheet">
        <div class="sheet-head">
          <span class="title">${isEdit ? 'Редагувати рахунок' : 'Новий рахунок'}</span>
          <button class="close" data-action="close-modal">${ICONS.close}</button>
        </div>
        <div class="sheet-body">

          <div class="field">
            <div class="field-label"><span class="lbl">Назва</span></div>
            <input class="input" type="text" placeholder="напр. AIB Current" value="${escapeAttr(f.name || '')}" data-form="name">
          </div>

          <div class="field">
            <div class="field-label"><span class="lbl">Валюта</span>${isEdit ? '<span class="opt">не можна змінити</span>' : ''}</div>
            ${isEdit ? `
              <div class="input" style="display: flex; align-items: center; gap: 8px; opacity: 0.6;">
                <span class="serif" style="font-size: 18px;">${CURRENCY_SYMBOLS[f.currency]}</span>
                <span style="font-size: 11px; letter-spacing: 0.12em;">${f.currency}</span>
              </div>
            ` : `
              <div class="cur-pick">
                ${ALL_CURRENCIES.map(c => `
                  <button class="${f.currency === c ? 'active' : ''}" data-action="pick-currency" data-key="${c}">
                    <span class="sym">${CURRENCY_SYMBOLS[c]}</span>
                    <span class="code">${c}</span>
                  </button>
                `).join('')}
              </div>
            `}
          </div>

          <div class="field">
            <div class="field-label"><span class="lbl">Колір</span></div>
            <div class="colors">
              ${COLOR_PALETTE.map(c => `
                <button class="${f.color === c ? 'active' : ''}" style="background:${c}" data-action="pick-color" data-key="${c}"></button>
              `).join('')}
            </div>
          </div>

          ${!isEdit ? `
            <div class="field">
              <div class="field-label"><span class="lbl">Стартовий залишок</span><span class="opt">опційно</span></div>
              <input class="input amount num" type="number" inputmode="decimal" step="0.01"
                placeholder="0.00" value="${escapeAttr(f.openingBalance || '')}"
                data-form="openingBalance">
              <div style="font-size:11px;color:var(--text-3);margin-top:6px;font-style:italic">Якщо заповниш — створиться транзакція «Початковий залишок» на сьогодні в валюті рахунку</div>
            </div>
          ` : ''}

          <div class="field">
            <div class="field-label"><span class="lbl">Ціль накопичення</span><span class="opt">опційно</span></div>
            <input class="input amount num" type="number" inputmode="decimal" step="0.01"
              placeholder="напр. 1000"
              value="${escapeAttr(f.goalAmount || '')}"
              data-form="goalAmount">
            <input class="input" type="text" style="margin-top: 8px;"
              placeholder="опис цілі (напр. «MacBook»)"
              value="${escapeAttr(f.goalDescription || '')}"
              data-form="goalDescription">
            <div style="font-size:11px;color:var(--text-3);margin-top:6px;font-style:italic">${isEdit ? 'Очисти суму щоб прибрати ціль' : 'Якщо заповниш суму — рахунок іде в секцію «Цілі» з прогрес-баром'}</div>
          </div>

        </div>
        <div class="sheet-foot">
          <button class="btn secondary" data-action="close-modal">Скасувати</button>
          <button class="btn primary" data-action="save-acc" ${valid ? '' : 'disabled'}>${isEdit ? 'Оновити' : 'Зберегти'}</button>
        </div>
      </div>
    </div>
  `;
}

function renderNewCatModal() {
  const f = state.modalForm;
  const isEdit = !!f.editingId;
  const valid = f.name && f.name.trim().length > 0 && f.type
    && !state.data.categories.some(c => c.name === f.name.trim() && c.type === f.type && c.id !== f.editingId);

  return `
    <div class="scrim">
      <div class="sheet">
        <div class="sheet-head">
          <span class="title">${isEdit ? 'Редагувати категорію' : 'Нова категорія'}</span>
          <button class="close" data-action="close-modal">${ICONS.close}</button>
        </div>
        <div class="sheet-body">

          <div class="field">

        </div>

    </div>
  `;

/* ============================================================
   ESCAPING
   ============================================================ */

function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
function escapeAttr(s) { return escapeHtml(s); }

/* ============================================================
   EVENT HANDLING
   ============================================================ */

function closeModalOrBack() {
  if (state.pendingTx) {
    state.modal = 'newTx';
    state.modalForm = state.pendingTx;
    state.pendingTx = null;
    state.modalCtx = null;
  } else {
    state.modal = null;
    state.modalCtx = null;
    state.modalForm = {};
  }
}

function updateCrossCurHint() {
  const hint = document.querySelector('.cross-cur-hint');
  if (!hint) return;
  const f = state.modalForm;
  const accs = state.data.accounts;
  const from = accs.find(a => a.id === f.accountId);
  const to = accs.find(a => a.id === f.toAccountId);
  if (!from || !to || from.currency === to.currency) return;
  const amt = parseFloat(f.amount);
  if (isNaN(amt) || amt <= 0) {
    hint.textContent = 'Розрахується автоматично за курсом, можеш скорегувати.';
  } else {
    const converted = convertCurrency(amt, from.currency, to.currency);
    hint.textContent = `За курсом ≈ ${fmtMoney(converted, false, to.currency)}. Скорегуй якщо банк дав інше.`;
  }
}

function autoFillToAmount() {
  const f = state.modalForm;
  const accs = state.data.accounts;
  const from = accs.find(a => a.id === f.accountId);
  const to = accs.find(a => a.id === f.toAccountId);
  if (!from || !to) return;
  if (from.currency === to.currency) return;
  // Only autofill if user hasn't manually edited toAmount (we track via toAmountEdited)
  if (state.modalForm.toAmountEdited) return;
  const amt = parseFloat(f.amount);
  if (isNaN(amt) || amt <= 0) return;
  const converted = convertCurrency(amt, from.currency, to.currency);
  state.modalForm.toAmount = converted.toFixed(2);
}

function setupEvents() {
  const app = document.getElementById('app');

  // Click delegation
  app.addEventListener('click', (e) => {
    // If clicked directly on the scrim background (not inside the sheet), close modal
    if (e.target.classList && e.target.classList.contains('scrim')) {
      closeModalOrBack();
      render();
      return;
    }
    const trigger = e.target.closest('[data-action]');
    if (!trigger) return;
    const action = trigger.dataset.action;
    const key = trigger.dataset.key;
    const id = trigger.dataset.id;
    handleAction(action, key, id, trigger);
  });

  // Input changes (for modal forms)
  app.addEventListener('input', (e) => {
    if (e.target.dataset.form) {
      const name = e.target.dataset.form;
      state.modalForm[name] = e.target.value;

      // Cross-currency transfer: live update of toAmount and hint when "from amount" changes
      if (state.modal === 'newTx' && state.modalForm.type === 'Transfer') {
        if (name === 'amount' && !state.modalForm.toAmountEdited) {
          autoFillToAmount();
          // Update the DOM directly — no re-render, no focus loss
          const toInput = document.getElementById('tx-to-amount');
          if (toInput) toInput.value = state.modalForm.toAmount || '';
          updateCrossCurHint();
        } else if (name === 'amount') {
          updateCrossCurHint();
        } else if (name === 'toAmount') {
          state.modalForm.toAmountEdited = true;
        }
      }

      toggleSubmitButton();
    }
  });

  // Change events: only for SELECT elements.
  // Text inputs fire 'change' on blur (e.g. when keyboard opens/closes on Android),
  // which would re-render and steal focus — so we exclude them here.
  app.addEventListener('change', (e) => {
    if (e.target.dataset.form && e.target.tagName === 'SELECT') {
      const val = e.target.value;
      // Special case: "+ New category" option inside the category select
      if (e.target.dataset.form === 'categoryId' && val === '__new__') {
        const f = state.modalForm;
        state.pendingTx = { ...f, categoryId: '' };  // clear placeholder
        state.modal = 'newCat';
        state.modalForm = { name: '', type: f.type || 'Expense', color: nextAutoColor() };
        vibrate(10);
        render();
        return;
      }
      state.modalForm[e.target.dataset.form] = val;

      // For Transfer: when accounts change, auto-fill toAmount via conversion
      // (only if user hasn't typed toAmount themselves yet)
      if (state.modal === 'newTx' && state.modalForm.type === 'Transfer') {
        autoFillToAmount();
      }

      render();
    }
  });

  // Blur on rate inputs — save the new rate when user finishes editing.
  app.addEventListener('blur', (e) => {
    if (e.target.dataset && e.target.dataset.form && e.target.dataset.form.startsWith('rate_')) {
      const cur = e.target.dataset.form.slice(5);
      const inv = parseFloat(e.target.value);
      if (!isNaN(inv) && inv > 0) {
        // User entered "1 EUR = inv CUR" → store rates[CUR] = 1/inv
        state.data.fxRates[cur] = 1 / inv;
        saveData();
      }
    }
  }, true);  // useCapture true — 'blur' doesn't bubble
}

function toggleSubmitButton() {
  const btn = document.querySelector('.sheet-foot .btn.primary');
  if (!btn) return;
  const f = state.modalForm;
  let valid = false;
  if (state.modal === 'newTx') {
    if (f.type === 'Transfer') {
      const accs = state.data.accounts.filter(a => !a.archived);
      const fromAcc = accs.find(a => a.id === f.accountId);
      const toAcc = accs.find(a => a.id === f.toAccountId);
      const amtOk = f.amount && parseFloat(f.amount) > 0;
      const diffAccs = f.accountId && f.toAccountId && f.accountId !== f.toAccountId;
      const toAmtOk = (fromAcc && toAcc && fromAcc.currency === toAcc.currency)
                      || (f.toAmount && parseFloat(f.toAmount) > 0);
      valid = fromAcc && toAcc && diffAccs && amtOk && toAmtOk;
    } else {
      valid = f.accountId && f.categoryId && f.amount && parseFloat(f.amount) > 0;
    }
  } else if (state.modal === 'newAcc') {
    valid = f.name && f.name.trim().length > 0 && f.currency && !state.data.accounts.some(a => a.name === f.name.trim());
  } else if (state.modal === 'newCat') {
    valid = f.name && f.name.trim().length > 0 && f.type && !state.data.categories.some(c => c.name === f.name.trim() && c.type === f.type);
  }
  btn.disabled = !valid;
}

function handleAction(action, key, id, trigger) {
  switch (action) {
    case 'set-view-cur':
      state.data.viewCurrency = key;
      saveData();
      vibrate(8);
      render();
      break;

    case 'tab':
      vibrate(8);
      state.view = key;
      state.subView = null;
      render();
      break;

    case 'open-acc-detail':
      state.subView = { type: 'accountDetail', id };
      vibrate(8);
      render();
      break;

    case 'back-to-accounts':
      state.subView = null;
      vibrate(8);
      render();
      break;

    case 'open-tx-detail': {
      const tx = state.data.transactions.find(t => t.id === id);
      if (!tx) return;
      state.modal = 'txDetail';
      state.modalCtx = tx;
      vibrate(10);
      render();
      break;
    }

    case 'edit-tx': {
      const tx = state.data.transactions.find(t => t.id === id);
      if (!tx) return;
      state.modal = 'newTx';
      state.modalForm = {
        editingId: tx.id,
        type: tx.type === 'Opening' ? 'Income' : tx.type,  // Opening can't be edited as Opening, treat as Income
        date: tx.date,
        amount: String(Math.abs(tx.amount)),
        accountId: tx.accountId,
        categoryId: tx.categoryId || '',
        toAccountId: tx.toAccountId || '',
        toAmount: tx.toAmount != null ? String(tx.toAmount) : '',
        toAmountEdited: true,  // pre-existing value, don't auto-overwrite
        note: tx.note || ''
      };
      vibrate(10);
      render();
      break;
    }

    case 'del-tx-from-detail': {
      const tx = state.data.transactions.find(t => t.id === id);
      if (!tx) return;
      state.modal = 'confirmDelTx';
      state.modalCtx = tx;
      vibrate(10);
      render();
      break;
    }

    case 'del-acc-from-detail': {
      const acc = state.data.accounts.find(a => a.id === id);
      if (!acc) return;
      if (accountHasTransactions(id)) {
        // Offer archiving instead of forbidding
        state.modal = 'confirmArchiveAcc';
        state.modalCtx = acc;
        vibrate(10);
        render();
        return;
      }
      state.modal = 'confirmDelAcc';
      state.modalCtx = acc;
      vibrate(10);
      render();
      break;
    }

    case 'stab':
      state.settingsTab = key;
      render();
      break;

    case 'open-new-tx':
      if (state.data.accounts.length === 0) {
        state.modal = 'infoBlocked';
        state.modalCtx = 'Спочатку додай хоча б один рахунок у вкладці «Рахунки».';
        render();
        return;
      }
      if (state.data.categories.length === 0) {
        state.modal = 'infoBlocked';
        state.modalCtx = 'Спочатку додай хоча б одну категорію в Налаштуваннях.';
        render();
        return;
      }
      state.modal = 'newTx';
      state.modalForm = { type: 'Expense', date: todayISO(), amount: '', accountId: '', categoryId: '', toAccountId: '', toAmount: '', toAmountEdited: false, note: '' };
      vibrate(10);
      render();
      break;

    case 'open-new-tx-for-account':
      if (state.data.categories.length === 0) {
        state.modal = 'infoBlocked';
        state.modalCtx = 'Спочатку додай хоча б одну категорію в Налаштуваннях.';
        render();
        return;
      }
      state.modal = 'newTx';
      state.modalForm = { type: 'Expense', date: todayISO(), amount: '', accountId: id, categoryId: '', toAccountId: '', toAmount: '', toAmountEdited: false, note: '' };
      vibrate(10);
      render();
      break;

    case 'open-new-cat-from-tx': {
      // Stash current new-tx form, open new-cat with the same type, return after save
      const f = state.modalForm;
      state.pendingTx = { ...f };
      state.modal = 'newCat';
      state.modalForm = { name: '', type: f.type || 'Expense', color: nextAutoColor() };
      vibrate(10);
      render();
      break;
    }

    case 'open-new-acc':
      state.modal = 'newAcc';
      state.modalForm = { name: '', currency: 'EUR', color: nextAutoColor(), openingBalance: '' };
      vibrate(10);
      render();
      break;

    case 'open-new-cat':
      state.modal = 'newCat';
      state.modalForm = { name: '', type: 'Expense', color: nextAutoColor() };
      vibrate(10);
      render();
      break;

    case 'tx-type':
      state.modalForm.type = key;
      // Reset fields that don't apply to the new type
      if (key === 'Transfer') {
        state.modalForm.categoryId = '';
      } else {
        state.modalForm.toAccountId = '';
        state.modalForm.toAmount = '';
        state.modalForm.categoryId = '';  // categories filtered by Income/Expense
      }
      render();
      break;

    case 'cat-type':
      state.modalForm.type = key;
      render();
      break;

    case 'pick-currency':
      state.modalForm.currency = key;
      render();
      break;

    case 'pick-color':
      state.modalForm.color = key;
      render();
      break;

    case 'save-tx': {
      const f = state.modalForm;
      const payload = {
        date: f.date,
        type: f.type,
        amount: f.amount,
        accountId: f.accountId,
        categoryId: f.type === 'Transfer' ? null : f.categoryId,
        note: f.note || '',
        toAccountId: f.toAccountId,
        toAmount: f.toAmount
      };
      if (f.editingId) {
        updateTransaction(f.editingId, payload);
      } else {
        createTransaction(payload);
      }
      state.modal = null;
      state.modalForm = {};
      vibrate([10, 40, 30]);
      render();
      break;
    }

    case 'save-acc': {
      const f = state.modalForm;
      if (f.editingId) {
        updateAccount(f.editingId, {
          name: f.name,
          color: f.color,
          goalAmount: f.goalAmount,
          goalDescription: f.goalDescription
        });
      } else {
        createAccount({
          name: f.name,
          currency: f.currency || 'EUR',
          color: f.color,
          openingBalance: f.openingBalance,
          goalAmount: f.goalAmount,
          goalDescription: f.goalDescription
        });
      }
      state.modal = null;
      state.modalForm = {};
      vibrate([10, 40, 30]);
      render();
      break;
    }

    case 'edit-acc': {
      const acc = state.data.accounts.find(a => a.id === id);
      if (!acc) return;
      state.modal = 'newAcc';
      state.modalForm = {
        editingId: acc.id,
        name: acc.name,
        currency: acc.currency,
        color: acc.color,
        goalAmount: acc.goal ? String(acc.goal.amount) : '',
        goalDescription: acc.goal ? acc.goal.description || '' : ''
      };
      vibrate(10);
      render();
      break;
    }

    case 'archive-acc-from-detail': {
      archiveAccount(id);
      state.modal = null;
      state.subView = null;
      vibrate([20, 30, 20]);
      render();
      break;
    }

    case 'unarchive-acc': {
      unarchiveAccount(id);
      vibrate([10, 30, 10]);
      render();
      break;
    }

    case 'save-cat': {
      const f = state.modalForm;
      if (f.editingId) {
        updateCategory(f.editingId, {
          name: f.name,
          type: f.type,
          color: f.color
        });
        state.modal = null;
        state.modalForm = {};
        vibrate([10, 40, 30]);
        render();
        break;
      }
      const newCat = createCategory({
        name: f.name,
        type: f.type,
        color: f.color
      });
      if (state.pendingTx) {
        // Return to new-tx with the freshly created category selected
        state.modal = 'newTx';
        state.modalForm = { ...state.pendingTx, type: newCat.type, categoryId: newCat.id };
        state.pendingTx = null;
      } else {
        state.modal = null;
        state.modalForm = {};
      }
      vibrate([10, 40, 30]);
      render();
      break;
    }

    case 'edit-cat': {
      const cat = state.data.categories.find(c => c.id === id);
      if (!cat) return;
      state.modal = 'newCat';
      state.modalForm = {
        editingId: cat.id,
        name: cat.name,
        type: cat.type,
        color: cat.color
      };
      vibrate(10);
      render();
      break;
    }

    case 'archive-cat-confirmed': {
      archiveCategory(id);
      state.modal = null;
      state.modalCtx = null;
      vibrate([20, 30, 20]);
      render();
      break;
    }

    case 'unarchive-cat': {
      unarchiveCategory(id);
      vibrate([10, 30, 10]);
      render();
      break;
    }

    case 'del-tx': {
      const tx = state.data.transactions.find(t => t.id === id);
      if (!tx) return;
      state.modal = 'confirmDelTx';
      state.modalCtx = tx;
      vibrate(10);
      render();
      break;
    }

    case 'del-acc': {
      const acc = state.data.accounts.find(a => a.id === id);
      if (!acc) return;
      if (accountHasTransactions(id)) {
        state.modal = 'infoBlocked';
        state.modalCtx = `Не можна видалити «${acc.name}» — на ньому є транзакції. Спочатку видали транзакції на вкладці «Список».`;
        render();
        return;
      }
      state.modal = 'confirmDelAcc';
      state.modalCtx = acc;
      vibrate(10);
      render();
      break;
    }

    case 'del-cat': {
      const cat = state.data.categories.find(c => c.id === id);
      if (!cat) return;
      if (categoryHasTransactions(id)) {
        state.modal = 'confirmArchiveCat';
        state.modalCtx = cat;
        vibrate(10);
        render();
        return;
      }
      state.modal = 'confirmDelCat';
      state.modalCtx = cat;
      vibrate(10);
      render();
      break;
    }

    case 'do-del-tx':
      deleteTransaction(state.modalCtx.id);
      state.modal = null;
      state.modalCtx = null;
      vibrate([20, 30, 20]);
      render();
      break;

    case 'do-del-acc':
      deleteAccount(state.modalCtx.id);
      state.modal = null;
      state.modalCtx = null;
      state.subView = null;
      vibrate([20, 30, 20]);
      render();
      break;

    case 'do-del-cat':
      deleteCategory(state.modalCtx.id);
      state.modal = null;
      state.modalCtx = null;
      vibrate([20, 30, 20]);
      render();
      break;

    case 'close-modal':
      closeModalOrBack();
      render();
      break;
  }
}

/* ============================================================
   INIT
   ============================================================ */

render();
setupEvents();

</script>
